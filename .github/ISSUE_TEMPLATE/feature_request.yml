name: Feature Request
description: Suggest a new profile, template, or CLI feature
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Feature summary
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
